name: CI

on:
  push:
    branches: master
  pull_request:
    branches: master
  schedule:
    - cron: '0 3 * * 6'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason'
        required: false
        default: 'Manual trigger'

jobs:
  Tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
          python-version: ["3.9", "3.10", "3.11", "3.12"]
          requirements-level: [min, pypi]
          cache-service: [redis]
          db-service: [postgresql13, postgresql16, mysql8]
          mq-service: [rabbitmq, redis]
          search-service: [elasticsearch7, opensearch2]

          exclude:
          - python-version: "3.10"
            requirements-level: min

          - python-version: "3.11"
            requirements-level: min

          - python-version: "3.12"
            requirements-level: min

          - db-service: postgresql16
            python-version: "3.9"

          include:
          - db-service: postgresql13
            DB_EXTRAS: "postgresql"

          - db-service: postgresql16
            DB_EXTRAS: "postgresql"

          - db-service: mysql8
            DB_EXTRAS: "mysql"

          - search-service: elasticsearch7
            SEARCH_EXTRAS: "elasticsearch7"

          - search-service: opensearch2
            SEARCH_EXTRAS: "opensearch2"

    env:
      CACHE: ${{ matrix.cache-service }}
      DB: ${{ matrix.db-service }}
      MQ: ${{ matrix.mq-service }}
      SEARCH: ${{ matrix.search-service }}
      EXTRAS: all,${{ matrix.DB_EXTRAS }},${{matrix.SEARCH_EXTRAS}}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Generate dependencies
        run: |
          python -m pip install --upgrade pip setuptools py wheel requirements-builder
          requirements-builder -e "$EXTRAS" --level=${{ matrix.requirements-level }} setup.py > .${{ matrix.requirements-level }}-${{ matrix.python-version }}-requirements.txt

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.${{ matrix.requirements-level }}-${{ matrix.python-version }}-requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r .${{matrix.requirements-level}}-${{ matrix.python-version }}-requirements.txt
          pip install ".[$EXTRAS]"
          pip freeze
          docker --version
          docker compose version

      - name: Run tests
        run: |
          ./run-tests.sh
